<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impossible Drinks — Invoice Finder</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --surface2: #1c1c22;
    --surface3: #24242c;
    --border: #2a2a34;
    --border-hover: #3a3a48;
    --text: #e8e8ec;
    --text-dim: #8888a0;
    --text-muted: #5c5c72;
    --accent: #c8a46e;
    --accent-dim: #8a7245;
    --accent-bg: rgba(200,164,110,0.08);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.1);
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }

  /* Layout */
  .app { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0; margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 1.4em; font-weight: 600; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .header h1 .dot { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 16px; }

  .user-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 20px; font-size: 0.85em;
  }
  .user-badge .indicator {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  }

  /* Buttons */
  .btn {
    padding: 8px 18px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-family: inherit; font-size: 0.88em;
    cursor: pointer; transition: all 0.15s; font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { border-color: var(--border-hover); background: var(--surface2); }
  .btn-primary {
    background: var(--accent); border-color: var(--accent);
    color: #0a0a0c; font-weight: 600;
  }
  .btn-primary:hover { background: #d4b07a; }
  .btn-sm { padding: 5px 12px; font-size: 0.8em; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px;
  }
  .card-title {
    font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin-bottom: 16px; font-weight: 600;
  }

  /* Config panel */
  .config-panel {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 700px) { .config-panel { grid-template-columns: 1fr; } }

  .config-section label {
    display: block; font-size: 0.82em; color: var(--text-dim);
    margin-bottom: 6px; font-weight: 500;
  }
  .config-section input[type="text"],
  .config-section select {
    width: 100%; padding: 9px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: inherit; font-size: 0.9em;
    outline: none; transition: border-color 0.15s;
  }
  .config-section input:focus, .config-section select:focus {
    border-color: var(--accent-dim);
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius-lg);
    padding: 32px; text-align: center; cursor: pointer;
    transition: all 0.2s; margin-bottom: 24px;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent-dim); background: var(--accent-bg);
  }
  .upload-zone .icon { font-size: 2em; margin-bottom: 8px; opacity: 0.5; }
  .upload-zone p { color: var(--text-dim); font-size: 0.9em; }
  .upload-zone .filename {
    color: var(--accent); font-weight: 500; margin-top: 6px;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto; border: 1px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: 24px;
  }
  table { width: 100%; min-width: 1180px; border-collapse: collapse; font-size: 0.85em; }
  thead { background: var(--surface2); }
  th {
    text-align: left; padding: 10px 14px; font-weight: 600;
    color: var(--text-dim); font-size: 0.78em; text-transform: uppercase;
    letter-spacing: 0.06em; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: var(--surface2); }
  tr.found { background: var(--green-bg); }
  tr.not-found { background: transparent; }
  tr.searching td:first-child::before {
    content: ''; display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--accent-dim); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 12px; font-size: 0.82em; font-weight: 500;
  }
  .status-badge.found { background: var(--green-bg); color: var(--green); }
  .status-badge.not-found { background: var(--red-bg); color: var(--red); }
  .status-badge.pending { background: var(--surface3); color: var(--text-muted); }
  .status-badge.searching { background: var(--blue-bg); color: var(--blue); }

  .attachment-list { margin-top: 6px; }
  .result-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .result-actions .btn,
  .attachment-list .btn { white-space: nowrap; }
  .attachment-item {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface3); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 4px; font-size: 0.78em;
    margin: 2px 4px 2px 0; cursor: pointer; transition: all 0.15s;
    color: var(--text-dim); text-decoration: none;
  }
  .attachment-item:hover {
    border-color: var(--accent-dim); color: var(--accent);
  }

  .mail-snippet {
    font-size: 0.8em; color: var(--text-muted); margin-top: 4px;
    max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Progress bar */
  .progress-bar {
    height: 3px; background: var(--surface3); border-radius: 2px;
    margin-bottom: 20px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.3s;
  }

  .stats-row {
    display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 20px;
    flex: 1; min-width: 140px;
  }
  .stat .value { font-size: 1.6em; font-weight: 700; letter-spacing: -0.02em; }
  .stat .label { font-size: 0.75em; color: var(--text-muted); margin-top: 2px; }
  .stat.found .value { color: var(--green); }
  .stat.not-found .value { color: var(--red); }

  /* Login screen */
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; text-align: center;
  }
  .login-screen h2 { font-size: 1.8em; font-weight: 700; margin-bottom: 8px; }
  .login-screen p { color: var(--text-dim); margin-bottom: 28px; max-width: 400px; }
  .login-screen .btn { font-size: 1em; padding: 12px 32px; }

  .logo-text {
    font-weight: 700; font-size: 1.1em; letter-spacing: 0.04em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 2.5em; margin-bottom: 12px; opacity: 0.3; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .search-actions {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }

  .log-panel {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; margin-top: 16px;
    max-height: 200px; overflow-y: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 0.75em; color: var(--text-muted); line-height: 1.8;
  }
  .log-panel .log-entry { white-space: pre-wrap; }
  .log-panel .log-entry.error { color: var(--red); }
  .log-panel .log-entry.success { color: var(--green); }
  .log-panel .log-entry.info { color: var(--blue); }

  .inline-input {
    display: flex; gap: 8px; align-items: center;
  }
  .inline-input input {
    flex: 1; padding: 8px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: inherit; font-size: 0.88em; outline: none;
  }
  .inline-input input:focus { border-color: var(--accent-dim); }

  /* Search tags */
  .search-tags {
    display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start;
    min-width: 180px;
  }
  .search-tag {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--accent-bg); border: 1px solid var(--accent-dim);
    color: var(--accent); padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78em;
    max-width: 200px; line-height: 1.4;
  }
  .search-tag .remove-tag {
    cursor: pointer; opacity: 0.5; font-size: 1.1em; line-height: 1;
    margin-left: 2px;
  }
  .search-tag .remove-tag:hover { opacity: 1; }
  .tag-add-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px dashed var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; font-size: 1em;
    transition: all 0.15s; flex-shrink: 0;
  }
  .tag-add-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
  .tag-input-wrap {
    display: flex; gap: 4px; align-items: center; margin-top: 4px; width: 100%;
  }
  .tag-input-wrap input {
    flex: 1; padding: 3px 7px; border-radius: 4px; min-width: 100px;
    border: 1px solid var(--accent-dim); background: var(--bg);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.78em; outline: none;
  }
  .tag-input-wrap input:focus { border-color: var(--accent); }
  .tag-input-wrap input::placeholder { color: var(--text-muted); }

  /* Mailbox picker */
  .mailbox-picker {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 24px;
  }
  .mailbox-picker-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .mailbox-picker-header .card-title { margin-bottom: 0; }
  .mailbox-picker-actions { display: flex; gap: 8px; }
  .mailbox-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 6px;
  }
  .mailbox-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: var(--radius);
    cursor: pointer; transition: background 0.1s;
    font-size: 0.85em;
  }
  .mailbox-item:hover { background: var(--surface2); }
  .mailbox-item input[type="checkbox"] {
    accent-color: var(--accent); width: 15px; height: 15px;
    cursor: pointer; flex-shrink: 0;
  }
  .mailbox-item .mail-addr {
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mailbox-item .mail-name {
    color: var(--text-muted); font-size: 0.82em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mailbox-count {
    font-size: 0.78em; color: var(--text-muted); margin-top: 8px;
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<!-- Config from Netlify environment variables (generated at build time) -->
<script src="config.js" onerror="window.NETLIFY_CONFIG={clientId:'',tenantId:''}"></script>
<!-- MSAL 2.x browser (via jsdelivr CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

<script>
// ============================================================
// State
// ============================================================
const state = {
  msalInstance: null,
  account: null,
  userToken: null,
  authReady: false,
  clientId: window.NETLIFY_CONFIG?.clientId || '',
  tenantId: window.NETLIFY_CONFIG?.tenantId || '',
  redirectUri: location.origin + location.pathname,
  invoices: [],
  results: {},
  users: [],
  selectedMailboxes: new Set(),
  isSearching: false,
  searchProgress: 0,
  logs: [],
  fileName: null,
  manualQuery: '',
  searchScope: 'all',
  searchYear: 'all',
  excludeLouvenberg: true,
  manualResults: [],
  backendOk: false,
};

const API_PATH = '/.netlify/functions/mail-read-app';
const USER_SCOPES = ['User.Read'];

// ============================================================
// Logging
// ============================================================
function log(msg, type = '') {
  const ts = new Date().toLocaleTimeString('nl-NL');
  state.logs.push({ ts, msg, type });
  if (state.logs.length > 200) state.logs.shift();
  render();
}

// ============================================================
// Frontend auth (Azure AD / MSAL)
// ============================================================
async function initAuth() {
  if (!state.clientId || !state.tenantId) {
    log('Azure frontend configuratie ontbreekt (clientId/tenantId)', 'error');
    state.authReady = true;
    render();
    return;
  }

  const config = {
    auth: {
      clientId: state.clientId,
      authority: `https://login.microsoftonline.com/${state.tenantId}`,
      redirectUri: state.redirectUri
    },
    cache: { cacheLocation: 'sessionStorage' }
  };

  state.msalInstance = new msal.PublicClientApplication(config);

  try {
    const resp = await state.msalInstance.handleRedirectPromise();
    if (resp && resp.account) {
      state.account = resp.account;
    } else {
      const accounts = state.msalInstance.getAllAccounts();
      if (accounts.length) state.account = accounts[0];
    }

    if (state.account) {
      await acquireUserToken();
      log('Ingelogd als ' + (state.account.username || state.account.name || 'gebruiker'), 'success');
      await initBackend();
    }
  } catch (e) {
    log('Login initialisatie mislukt: ' + e.message, 'error');
  } finally {
    state.authReady = true;
    render();
  }
}

async function login() {
  if (!state.msalInstance) return;
  await state.msalInstance.loginRedirect({ scopes: USER_SCOPES });
}

async function acquireUserToken() {
  if (!state.msalInstance || !state.account) return null;
  const resp = await state.msalInstance.acquireTokenSilent({
    scopes: USER_SCOPES,
    account: state.account
  });
  state.userToken = resp.accessToken;
  return state.userToken;
}

function logout() {
  if (!state.msalInstance) return;
  state.msalInstance.logoutRedirect();
}

// ============================================================
// Backend API
// ============================================================
async function callApi(action, payload = {}, retryOnAuth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (state.userToken) headers.Authorization = `Bearer ${state.userToken}`;

  const resp = await fetch(API_PATH, {
    method: 'POST',
    headers,
    body: JSON.stringify({ action, ...payload })
  });

  const text = await resp.text();
  let data = {};
  try {
    data = text ? JSON.parse(text) : {};
  } catch (e) {
    throw new Error('Backend gaf geen geldige JSON terug');
  }

  if (resp.status === 401 && retryOnAuth && state.account) {
    try {
      await acquireUserToken();
      return callApi(action, payload, false);
    } catch (e) {
      throw new Error('Sessie verlopen, log opnieuw in');
    }
  }

  if (!resp.ok) {
    throw new Error(data.error || `Backend fout (${resp.status})`);
  }

  return data;
}

async function initBackend() {
  try {
    await callApi('health');
    state.backendOk = true;
    log('Netlify functie actief (application-level Graph)', 'success');
    await loadUsers();
  } catch (e) {
    state.backendOk = false;
    log('Backend niet bereikbaar: ' + e.message, 'error');
  }
  render();
}

// ============================================================
// Load org users
// ============================================================
async function loadUsers() {
  try {
    const data = await callApi('listMailboxes');
    state.users = (data.mailboxes || []).filter(u => {
      const mail = String(u.mail || '').toLowerCase().trim();
      return mail.endsWith('@impossible-drinks.com');
    });
    state.selectedMailboxes = new Set(state.users.map(u => u.mail));
    log(`${state.users.length} mailboxen geladen`, 'success');
    render();
  } catch (e) {
    log('Kan mailboxen niet laden: ' + e.message, 'error');
    state.users = [];
    render();
  }
}

// ============================================================
// Excel parsing
// ============================================================
function handleFile(file) {
  state.fileName = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

    const invoices = [];
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row[0] || !row[2]) continue;
      const desc = String(row[3] || '');
      if (!desc) continue;
      const amount = row[4] || 0;
      const datum = row[2];
      let dateStr = '';
      if (typeof datum === 'number') {
        const d = XLSX.SSF.parse_date_code(datum);
        dateStr = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      } else if (datum instanceof Date) {
        dateStr = datum.toISOString().split('T')[0];
      } else {
        dateStr = String(datum);
      }
      invoices.push({
        idx: i,
        dagboek: row[1] || '',
        datum: dateStr,
        omschrijving: desc,
        bedrag: parseFloat(amount) || 0,
        searchTerms: extractSearchTerms(desc),
      });
    }
    state.invoices = invoices;
    state.results = {};
    log(`${invoices.length} regels geladen uit ${file.name}`, 'success');
    render();
  };
  reader.readAsArrayBuffer(file);
}

function extractSearchTerms(desc) {
  let clean = desc
    .replace(/via\s+(Stichting\s+)?Mollie\s+Payments?/gi, '')
    .replace(/via\s+Tikkie\s+Zakelijk/gi, '')
    .replace(/via\s+Stripe\s+Technology.*/gi, '')
    .replace(/via\s+Rabo\s+Zakelijk\s+Betaalverzoek/gi, '')
    .replace(/via\s+CM\.com/gi, '')
    .replace(/NL\d{2}[A-Z]{4}\d+/g, '')
    .replace(/\b\d{10,}\b/g, '')
    .replace(/\b[A-Z0-9]{8,20}\b/g, (m) => {
      return /[aeiou]/i.test(m) ? m : '';
    })
    .replace(/PAS\d+\s+NR:\w+/g, '')
    .replace(/BEA,?\s*Apple\s*Pay\s*/gi, '')
    .replace(/SP\s+\w+/g, '')
    .replace(/\s+/g, ' ')
    .trim();

  const parts = clean.split(/[,\/]/);
  const name = parts[0].trim();
  const invoiceNums = desc.match(/\b\d{4,8}\b/g) || [];
  const companyName = (name.substring(0, 60) || desc.substring(0, 40)).trim();
  const terms = [companyName];
  for (const num of invoiceNums) {
    if (!terms.includes(num) && num.length >= 4) terms.push(num);
  }
  return terms.filter(Boolean);
}

// ============================================================
// Search logic
// ============================================================
async function runInvoiceSearch(inv) {
  const mailboxes = getSelectedMailboxes();
  const terms = inv.searchTerms || [];
  if (!terms.length || !mailboxes.length) return { found: false, mails: [] };

  const data = await callApi('searchMessages', {
    terms,
    mailboxes,
    searchScope: state.searchScope,
    searchYear: state.searchYear,
    excludeLouvenberg: state.excludeLouvenberg,
    top: 5
  });

  return {
    found: (data.messages || []).length > 0,
    mails: data.messages || []
  };
}

async function searchAllInvoices() {
  if (!state.backendOk || state.invoices.length === 0) return;
  if (getSelectedMailboxes().length === 0) {
    log('Selecteer minimaal 1 mailbox', 'error');
    return;
  }

  state.isSearching = true;
  state.searchProgress = 0;
  state.results = {};
  render();

  for (let i = 0; i < state.invoices.length; i++) {
    const inv = state.invoices[i];
    state.searchProgress = ((i + 1) / state.invoices.length) * 100;
    const terms = inv.searchTerms || [];
    log(`Zoeken (${scopeLabel(state.searchScope)}, ${yearLabel(state.searchYear)}): ${terms.map(t => '"' + t + '"').join(', ')}`, 'info');

    try {
      state.results[i] = await runInvoiceSearch(inv);
    } catch (e) {
      state.results[i] = { found: false, mails: [] };
      log(`Zoekfout bij regel ${i + 1}: ${e.message}`, 'error');
    }
    render();
  }

  state.isSearching = false;
  const foundCount = Object.values(state.results).filter(r => r.found).length;
  log(`Klaar: ${foundCount}/${state.invoices.length} gevonden`, 'success');
  render();
}

async function searchSingleInvoice(idx) {
  const inv = state.invoices[idx];
  if (!inv || !state.backendOk) return;

  if (getSelectedMailboxes().length === 0) {
    log('Selecteer minimaal 1 mailbox', 'error');
    return;
  }

  const terms = inv.searchTerms || [];
  log(`Zoeken (${scopeLabel(state.searchScope)}, ${yearLabel(state.searchYear)}): ${terms.map(t => '"' + t + '"').join(', ')}`, 'info');
  try {
    state.results[idx] = await runInvoiceSearch(inv);
    const count = state.results[idx].mails.length;
    log(count ? `${count} mails gevonden` : 'Geen resultaten', count ? 'success' : 'error');
  } catch (e) {
    state.results[idx] = { found: false, mails: [] };
    log('Zoekfout: ' + e.message, 'error');
  }
  render();
}

async function searchManual() {
  if (!state.backendOk || !state.manualQuery) return;
  if (getSelectedMailboxes().length === 0) {
    log('Selecteer minimaal 1 mailbox', 'error');
    return;
  }

  log(`Handmatig zoeken (${scopeLabel(state.searchScope)}, ${yearLabel(state.searchYear)}): "${state.manualQuery}"`, 'info');
  state.manualResults = [];
  render();

  try {
    const data = await callApi('searchMessages', {
      terms: [state.manualQuery],
      mailboxes: getSelectedMailboxes(),
      searchScope: state.searchScope,
      searchYear: state.searchYear,
      excludeLouvenberg: state.excludeLouvenberg,
      top: 10
    });
    state.manualResults = data.messages || [];
    log(`${state.manualResults.length} resultaten gevonden`, state.manualResults.length ? 'success' : 'error');
  } catch (e) {
    log('Handmatig zoeken mislukt: ' + e.message, 'error');
  }
  render();
}

// ============================================================
// Attachments
// ============================================================
async function fetchAttachments(mailbox, messageId) {
  try {
    const data = await callApi('getAttachments', { mailbox, messageId });
    return data.attachments || [];
  } catch (e) {
    log('Bijlagen ophalen mislukt: ' + e.message, 'error');
    return [];
  }
}

function downloadAttachment(att) {
  if (!att.contentBytes) return;
  const byteChars = atob(att.contentBytes);
  const byteArray = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) byteArray[i] = byteChars.charCodeAt(i);
  const blob = new Blob([byteArray], { type: att.contentType || 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = att.name || 'attachment';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function showAttachments(mailbox, messageId, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = 'Laden...';
  const atts = await fetchAttachments(mailbox, messageId);
  if (atts.length === 0) {
    btnEl.textContent = 'Geen downloadbare bijlagen';
    log('Geen downloadbare bijlagen gevonden voor dit bericht', 'info');
    setTimeout(() => {
      btnEl.disabled = false;
      btnEl.textContent = '📎 Ophalen';
    }, 1800);
    return;
  }
  const container = btnEl.parentElement;
  btnEl.style.display = 'none';
  for (const att of atts) {
    const link = document.createElement('a');
    link.className = 'attachment-item';
    link.href = '#';
    link.textContent = `📎 ${att.name} (${formatBytes(att.size)})`;
    link.onclick = (e) => {
      e.preventDefault();
      downloadAttachment(att);
    };
    container.appendChild(link);
  }
}

function formatBytes(b) {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('nl-NL', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  });
}

function formatCurrency(n) {
  return new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR' }).format(n);
}

function getSelectedMailboxes() {
  return [...state.selectedMailboxes];
}

function scopeLabel(scope) {
  if (scope === 'subject') return 'Onderwerp';
  if (scope === 'from') return 'Afzender';
  if (scope === 'body') return 'Body';
  return 'Alles';
}

function getYearOptions() {
  const years = new Set();
  const currentYear = new Date().getFullYear();
  // Always offer a recent range, even before invoices are loaded.
  for (let y = currentYear; y >= currentYear - 5; y--) {
    years.add(y);
  }
  // Explicit guard so 2024 is available as requested.
  years.add(2024);

  for (const inv of state.invoices) {
    const m = String(inv?.datum || '').match(/^(\d{4})/);
    if (!m) continue;
    years.add(Number(m[1]));
  }

  return Array.from(years)
    .filter(y => Number.isInteger(y) && y >= 2000 && y <= 2100)
    .sort((a, b) => b - a);
}

function yearLabel(year) {
  return year === 'all' ? 'Alle jaren' : `Jaar ${year}`;
}

function bindLoginEvents() {
  document.getElementById('btn-login')?.addEventListener('click', async () => {
    try {
      await login();
    } catch (e) {
      log('Inloggen mislukt: ' + e.message, 'error');
    }
  });
}

function bindMainEvents() {
  document.getElementById('btn-logout')?.addEventListener('click', () => {
    logout();
  });
  document.getElementById('btn-search-all')?.addEventListener('click', () => {
    searchAllInvoices();
  });
  document.getElementById('btn-manual-search')?.addEventListener('click', () => {
    searchManual();
  });
  document.getElementById('btn-refresh-mailboxes')?.addEventListener('click', () => {
    loadUsers();
  });

  const manualInput = document.getElementById('manual-query');
  if (manualInput) {
    manualInput.addEventListener('input', e => {
      state.manualQuery = e.target.value;
    });
    manualInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') searchManual();
    });
  }

  const scopeSelect = document.getElementById('search-scope');
  if (scopeSelect) {
    scopeSelect.addEventListener('change', e => {
      state.searchScope = e.target.value;
      log(`Zoekveld ingesteld op: ${scopeLabel(state.searchScope)}`, 'info');
    });
  }

  const yearSelect = document.getElementById('search-year');
  if (yearSelect) {
    yearSelect.addEventListener('change', e => {
      state.searchYear = e.target.value;
      log(`Jaarfilter ingesteld op: ${yearLabel(state.searchYear)}`, 'info');
    });
  }

  const excludeLouvenberg = document.getElementById('exclude-louvenberg');
  if (excludeLouvenberg) {
    excludeLouvenberg.addEventListener('change', e => {
      state.excludeLouvenberg = !!e.target.checked;
      log(
        state.excludeLouvenberg
          ? 'Filter actief: @louvenbergadvies.nl wordt uitgesloten'
          : 'Filter uit: @louvenbergadvies.nl wordt meegenomen',
        'info'
      );
    });
  }

  document.querySelectorAll('.mailbox-item input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', e => {
      const mailbox = e.target.dataset.mailbox;
      if (e.target.checked) {
        state.selectedMailboxes.add(mailbox);
      } else {
        state.selectedMailboxes.delete(mailbox);
      }
      const header = document.querySelector('.mailbox-picker-header .card-title');
      if (header) header.textContent = `Mailboxen doorzoeken (${state.selectedMailboxes.size}/${state.users.length})`;
    });
  });

  document.getElementById('btn-select-all')?.addEventListener('click', () => {
    state.selectedMailboxes = new Set(state.users.map(u => u.mail));
    render();
  });
  document.getElementById('btn-select-none')?.addEventListener('click', () => {
    state.selectedMailboxes.clear();
    render();
  });

  const zone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');
  if (zone && fileInput) {
    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });
  }

  const logPanel = document.getElementById('log-panel');
  if (logPanel) logPanel.scrollTop = logPanel.scrollHeight;
}

window.showAttachments = showAttachments;
window.searchSingleInvoice = searchSingleInvoice;
window.removeSearchTerm = function(invIdx, termIdx) {
  if (state.invoices[invIdx]) {
    state.invoices[invIdx].searchTerms.splice(termIdx, 1);
    render();
  }
};
window.showTagInput = function(invIdx) {
  const container = document.getElementById('tags-' + invIdx);
  if (!container || container.querySelector('.tag-input-wrap')) return;
  const wrap = document.createElement('div');
  wrap.className = 'tag-input-wrap';
  wrap.innerHTML = '<input type="text" placeholder="Factuurnr, bedrijf..." autofocus>';
  container.appendChild(wrap);
  const input = wrap.querySelector('input');
  input.focus();
  const addTerm = () => {
    const val = input.value.trim();
    if (val && state.invoices[invIdx]) {
      const newTerms = val.split(',').map(t => t.trim()).filter(Boolean);
      state.invoices[invIdx].searchTerms.push(...newTerms);
      render();
    } else {
      wrap.remove();
    }
  };
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTerm();
    }
    if (e.key === 'Escape') wrap.remove();
  });
  input.addEventListener('blur', () => setTimeout(addTerm, 150));
};

// ============================================================
// Init
// ============================================================
render();
initAuth();
</script>
</body>
